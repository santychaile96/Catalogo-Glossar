<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlosSar - Catálogo de Maquillaje</title>
    <style>
        :root {
            --primary-color: #f21b21; /* El rojo/fucsia vibrante de las letras de tu logo */
            --accent-color: #ffb3d1;  /* El rosa pastel de fondo de tu logo */
            --bg-color: #fff0f5;      /* Un rosa ultra claro de fondo para la app */
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 110px;
        }

        header {
            background-color: var(--accent-color); /* Fondo rosa pastel como el logo */
            text-align: center;
            padding: 20px 15px;
            box-shadow: 0 4px 10px rgba(242, 27, 33, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        /* Espacio para que pongas tu logo */
        .brand-logo {
            max-width: 180px;
            height: auto;
            border-radius: 10px;
        }

        header h1 {
            font-size: 2.4rem;
            color: var(--primary-color);
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
            display: none; /* Se oculta si usás la imagen del logo abajo */
        }

        header p {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: 700;
            letter-spacing: 2px;
            background-color: rgba(255, 255, 255, 0.6);
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 5px;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(242, 27, 33, 0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            border: 1px solid rgba(242, 27, 33, 0.08);
        }

        .product-card:active {
            transform: scale(0.97);
        }

        .product-img {
            width: 100%;
            height: 160px;
            background-color: #fce4ec;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 0.8rem;
            object-fit: cover;
        }

        .product-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #444;
        }

        .product-price {
            font-size: 1.15rem;
            color: var(--primary-color);
            font-weight: 700;
            margin-top: auto;
            margin-bottom: 10px;
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            width: 100%;
            box-shadow: 0 2px 6px rgba(242, 27, 33, 0.2);
        }

        /* Barra fija inferior del Carrito con estilo GlosSar */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: white;
            padding: 15px;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -5px 20px rgba(242, 27, 33, 0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
            z-index: 100;
            border-top: 2px solid var(--accent-color);
        }

        .cart-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-color);
            padding: 0 5px;
        }

        .address-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ffccd5;
            background-color: #fffafb;
            color: #333;
            font-size: 0.9rem;
            outline: none;
        }

        .address-input:focus {
            border-color: var(--primary-color);
        }

        .address-input::placeholder {
            color: #bfa3a7;
        }

        .btn-order {
            background-color: #25d366; /* Verde WhatsApp oficial */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
            box-shadow: 0 3px 8px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <!-- Reemplazá 'glossar nuevo.jpeg' por la URL real de tu imagen en tu repositorio más adelante -->
        <img src="glossar nuevo.jpeg" class="brand-logo" alt="GlosSar Maquillajes" onerror="this.style.display='none'; document.getElementById('alt-title').style.display='block';">
        <h1 id="alt-title">GlosSar</h1>
        <p>✨ ENVÍOS A DOMICILIO SIN COSTO ✨</p>
    </header>

    <div class="container">
        <div class="products-grid" id="products-container"></div>
    </div>

    <div class="cart-bar">
        <div class="cart-summary">
            <span id="cart-count">Productos: 0</span>
            <span id="cart-total">Total: $0</span>
        </div>
        <input type="text" id="delivery-address" class="address-input" placeholder="📍 Escribí tu dirección para el envío...">
        <button class="btn-order" onclick="sendOrder()">Enviar Pedido por WhatsApp</button>
    </div>

    <script>
        // LISTADO DE PRODUCTOS (Modificá los precios y nombres aquí)
        const products = [
            { id: 1, name: "Brillo Labial Gloss", price: 2500, img: "https://via.placeholder.com/150" },
            { id: 2, name: "Base Líquida Matte", price: 4500, img: "https://via.placeholder.com/150" },
            { id: 3, name: "Máscara de Pestañas", price: 3200, img: "https://via.placeholder.com/150" },
            { id: 4, name: "Paleta de Sombras", price: 6000, img: "https://via.placeholder.com/150" },
            { id: 5, name: "Rubor Compacto", price: 2800, img: "https://via.placeholder.com/150" }
        ];

        // TU NÚMERO DE TELÉFONO (Con código de país, ejemplo Argentina: 549...)
        const phoneNumber = "5492975297116"; 

        let cart = {};

        const container = document.getElementById('products-container');
        products.forEach(p => {
            container.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" class="product-img" alt="${p.name}">
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-price">$${p.price}</div>
                        <button class="btn-add" onclick="addToCart(${p.id})">Agregar (<span id="qty-${p.id}">0</span>)</button>
                    </div>
                </div>
            `;
        });

        function addToCart(id) {
            if (cart[id]) {
                cart[id]++;
            } else {
                cart[id] = 1;
            }
            document.getElementById(`qty-${id}`).innerText = cart[id];
            updateCartSummary();
        }

        function updateCartSummary() {
            let totalItems = 0;
            let totalPrice = 0;

            for (const id in cart) {
                const product = products.find(p => p.id == id);
                totalItems += cart[id];
                totalPrice += product.price * cart[id];
            }

            document.getElementById('cart-count').innerText = `Productos: ${totalItems}`;
            document.getElementById('cart-total').innerText = `Total: $${totalPrice}`;
        }

        function sendOrder() {
            const address = document.getElementById('delivery-address').value.trim();
            
            if (Object.keys(cart).length === 0) {
                alert("Por favor, agrega al menos un producto al carrito.");
                return;
            }
            if (!address) {
                alert("Por favor, ingresa tu dirección para realizar el envío sin costo.");
                return;
            }

            let message = "¡Hola *GlosSar*! 💋✨ Quiero realizar el siguiente pedido:\n\n";
            let totalPrice = 0;

            for (const id in cart) {
                const product = products.find(p => p.id == id);
                const subtotal = product.price * cart[id];
                totalPrice += subtotal;
                message += `▪️ *${cart[id]}x* ${product.name} _($${product.price} c/u)_\n`;
            }

            message += `\n💰 *Total del Pedido:* $${totalPrice}`;
            message += `\n📍 *Dirección de envío:* ${address}`;
            message += `\n\n_Envío a domicilio sin costo._`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;

            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
